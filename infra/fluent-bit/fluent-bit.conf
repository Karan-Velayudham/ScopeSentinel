# ============================================================================
# Fluent Bit config — log shipper for all ScopeSentinel services (Epic 5.5.2)
#
# Collects Docker JSON logs → ships to OpenSearch.
# Deploy as sidecar or DaemonSet in k3s.
# ============================================================================

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

[INPUT]
    Name              tail
    Tag               docker.*
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    DB                /var/log/flb_docker.db
    Mem_Buf_Limit     50MB
    Skip_Long_Lines   On

[FILTER]
    Name   kubernetes
    Match  docker.*
    Kube_URL          https://kubernetes.default.svc:443
    Kube_CA_File      /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File   /var/run/secrets/kubernetes.io/serviceaccount/token
    Kube_Tag_Prefix   docker.var.log.containers.
    Merge_Log         On
    Keep_Log          Off
    K8S-Logging.Parser  On
    K8S-Logging.Exclude Off

[FILTER]
    Name   grep
    Match  docker.*
    # Only forward logs from ScopeSentinel services
    Regex  $kubernetes['labels']['app'] scopesentinel

[OUTPUT]
    Name            opensearch
    Match           docker.*
    Host            opensearch
    Port            9200
    Index           scopesentinel-logs
    Type            _doc
    Logstash_Format On
    Logstash_Prefix scopesentinel
    Time_Key        @timestamp
    Retry_Limit     False
    Trace_Error     On
    Replace_Dots    On
    Suppress_Type_Name On
