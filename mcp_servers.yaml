# ScopeSentinel MCP Server Registry
#
# Define each MCP server as a named entry under `mcp_servers`.
# Each entry must have:
#   command  - the executable to run (e.g. "python", "npx", "node")
#   args     - list of arguments to pass to the command
#   env      - optional map of extra environment variables
#              Use ${ENV_VAR} syntax to inject values from the shell environment.
#
# At startup, mcp_pool.load_client_pool() reads this file, connects to each
# server, and builds a flat tool_registry: dict[str, Callable] for agents to use.

mcp_servers:
  # ScopeSentinel built-in tools (Jira, Git, GitHub wrappers)
  scope_sentinel_tools:
    command: "python"
    args: ["tools/mcp_server.py"]
    env: {}

  # Example: Official GitHub MCP server
  # Uncomment and set GITHUB_PERSONAL_ACCESS_TOKEN in your .env to enable.
  # github:
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-github"]
  #   env:
  #     GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_PERSONAL_ACCESS_TOKEN}"

  # Example: Official Jira MCP server
  # jira:
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-jira"]
  #   env:
  #     JIRA_HOST: "${JIRA_BASE_URL}"
  #     JIRA_API_TOKEN: "${JIRA_API_TOKEN}"
