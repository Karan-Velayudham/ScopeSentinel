# =============================================================================
# ScopeSentinel — docker-compose for Phase 3
#
# Usage:
#   docker compose up -d                  # start everything
#   docker compose --profile auth up -d   # also start Keycloak
#   docker compose logs -f api            # tail API logs
# =============================================================================

version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: scopesentinel-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-scopesentinel}
      POSTGRES_USER: ${DB_USER:-sentinel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sentinel_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-sentinel} -d ${DB_NAME:-scopesentinel}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis / Valkey ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: scopesentinel-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redpanda (Phase 3 Event Streaming) ───────────────────────────────────────
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    container_name: scopesentinel-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --check=false
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
    ports:
      - "18081:18081"
      - "18082:18082"
      - "19092:19092"
      - "19644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: [ "CMD-SHELL", "rpk cluster health" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Redpanda Console ─────────────────────────────────────────────────────────
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    container_name: scopesentinel-redpanda-console
    entrypoint: /bin/sh
    command: -c "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yml; /app/console"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
          schemaRegistry:
            enabled: true
            urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  # ── FastAPI Control Plane ────────────────────────────────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    image: scopesentinel-api:latest
    container_name: scopesentinel-api
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: "redis://redis:6379/0"
      TEMPORAL_ADDRESS: "temporal:7233"
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started

  # ── Temporal Server ──────────────────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    container_name: scopesentinel-temporal
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${DB_USER:-sentinel}
      - POSTGRES_PWD=${DB_PASSWORD:-sentinel_dev}
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Temporal UI ──────────────────────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:latest
    container_name: scopesentinel-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8088:8080"
    depends_on:
      - temporal

  # ── MinIO (S3 compatible storage) ────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: scopesentinel-minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=adminpassword
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # ── Temporal Worker (Agent Runtime) ──────────────────────────────────────────
  temporal-worker:
    build:
      context: ./services/agent-runtime
      dockerfile: Dockerfile
      target: runtime
    image: scopesentinel-agent-runtime:latest
    container_name: scopesentinel-temporal-worker
    command: [ "python", "temporal_worker.py" ]
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: "redis://redis:6379/0"
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TEMPORAL_ADDRESS: "temporal:7233"
      MINIO_URL: "http://minio:9000"
      MINIO_ACCESS_KEY: "admin"
      MINIO_SECRET_KEY: "adminpassword"
      LITELLM_URL: "http://litellm:4000"
    volumes:
      - ./workspace:/app/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      temporal:
        condition: service_started

  # ── Agent Runtime (CLI mode — kept for backward compat) ──────────────────────
  agent-runtime:
    build:
      context: ./services/agent-runtime
      dockerfile: Dockerfile
      target: runtime
    image: scopesentinel-agent-runtime:latest
    container_name: scopesentinel-agent-runtime
    profiles: [ "cli" ]
    env_file:
      - .env
    environment:
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./workspace:/app/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    command: [ "--ticket", "${TICKET:-SCRUM-8}" ]

  # ── Keycloak (Phase 1 auth — optional) ──────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: scopesentinel-keycloak
    profiles: [ "auth" ]
    command: [ "start-dev", "--import-realm" ]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import
    ports:
      - "9080:8080" # changed from 8080 to avoid clash with redpanda-console

  # ── Webhook Receiver (Phase 3) ───────────────────────────────────────────────
  webhook-receiver:
    build:
      context: ./services/webhook-receiver
      dockerfile: Dockerfile
    image: scopesentinel-webhook-receiver:latest
    container_name: scopesentinel-webhook-receiver
    environment:
      REDPANDA_BROKERS: "redpanda:9092"
      WEBHOOK_TOPIC: "incoming-events"
    ports:
      - "8001:8001"
    depends_on:
      redpanda:
        condition: service_healthy

  # ── Trigger Engine (Phase 3) ─────────────────────────────────────────────────
  trigger-engine:
    build:
      context: ./services/trigger-engine
      dockerfile: Dockerfile
    image: scopesentinel-trigger-engine:latest
    container_name: scopesentinel-trigger-engine
    environment:
      REDPANDA_BROKERS: "redpanda:9092"
      WEBHOOK_TOPIC: "incoming-events"
      API_URL: "http://api:8000"
    depends_on:
      redpanda:
        condition: service_healthy
      api:
        condition: service_started

  # ── LiteLLM Proxy (Phase 4) ──────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: scopesentinel-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml
    env_file:
      - .env
    command: [ "--config", "/app/config.yaml", "--port", "4000", "--detailed_debug" ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:4000/health/liveness || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant Vector DB (Phase 4 RAG) ───────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: scopesentinel-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:6333/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redpanda_data:
  minio_data:
  qdrant_data:
